services:
    app:
        build:
            context: .
            dockerfile: Dockerfile
        container_name: react-crm
        volumes:
            - .:/var/www/html
        env_file:
            - .env
        depends_on:
            mysql:
                condition: service_healthy
        restart: unless-stopped

    nginx:
        image: nginx:latest
        container_name: nginx_server
        ports:
            - "8000:80"
        volumes:
            - ./:/var/www
            - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
        depends_on:
            - app
        restart: unless-stopped

    mysql:
        image: mysql:8.0
        container_name: mysql_db
        environment:
            MYSQL_ROOT_PASSWORD: root
            MYSQL_DATABASE: react_crm
            MYSQL_USER: milind
            MYSQL_PASSWORD: "Milind$$2324"
        volumes:
            - mysql_data:/var/lib/mysql
        healthcheck:
            test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
            interval: 1m30s
            timeout: 30s
            retries: 5
            start_period: 30s
        restart: unless-stopped

    phpmyadmin:
        image: phpmyadmin/phpmyadmin
        container_name: phpmyadmin
        environment:
            PMA_HOST: mysql
            PMA_USER: milind
            PMA_PASSWORD: Milind$$2324
        ports:
            - "8080:80"
        depends_on:
            - mysql
        restart: unless-stopped
volumes:
    mysql_data:
